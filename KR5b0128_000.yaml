front:
  text: 二篇同卷有二
  hash: sha256:07c58184dc91f3c7c8854d95f4310686fc3e06c58b744315663db37c03894d6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0128_HFL_000-001a, image: hfl/0198/0198-042.png}
body:
  text: 洞玄靈寶三師記洞玄靈寶三師名諱形狀居觀方所文洞玄靈寶三師記并序廣成先生劉處靜撰道之體也至靜而無為道之用也通生而赴感始乎無始先乎無先起於妙無而生妙有至真之教由兹而立焉我元始天尊啓重玄歷五太握元化運真精總括妙門以為法印付于大道君道君鑽統以光大之敷暢以宣布之凡十二印包舉幽頥窮逹玄妙以授于老君老君奉而行之上極三清旁周無外綿亘億載開導未聞帝帝為師方方立教幽明巨細靡不宗馬自是奕葉紹承師師授度上自元始下逮兹辰故受道尊奉其為度師乎度師之師曰籍師籍者嗣也嗣籍真乘離凡契道籍師之師曰經師經者由也由師開悟捨凡登仙三師之重媲于祖宗祖宗能傳之而不能使兆致道父母能生之而不能使兆升仙奉師之道無以過矣儒家在三之義莫能及焉欽惟三君煥有明德追仰尊稟瞻慕無階粵自上賔未列圖紀雖貞猷茂範刋勒於名山而後學門人難披於具奧敢條實録昭示將來輒陳小序仍為頌述道弟吳興陸甚夷已敘道元先生休烈但繼裁短讃以紀德風庶劫歷有終而清規不泯有唐龍集庚辰中元日甲辰序三師經師南嶽上清大洞田君諱虛應字良逸齊國人也隋開皇中侍親而居攸縣之西數里以為地接人煙非栖息進道之所雖林麓清幽亦捨之而去遷于嶽中君稟靈純粹夙藴天和紹媯水之靈源纂重華之孝德其後擁耒於紫蓋峯之東南層巖之下躬耕稼穡致養於親五十餘年晨夕無息雖欲披榛訪道匿景尋真而肅恭溫清罔敢自適洎聖善委蛻乃同遊五峯放志長往唐龍朔年中與隱仙何君相遇默傳其道自此煙蘿泉石所止忌歸由是山門居無定所州牧田侯遐迎道德於嶽觀殿東構降真堂田千乘諸葛黃述讃于壁以旌玄德先生時憩於兹弘道傳法所授上清大洞自貞一先生傳天師薛君薛君以傳先生先生纘承玄要深臻道域涉歷雲水二百餘年雖寒暑遷貿而壽紀莫窮至今諸夆遊人往往有見之者斯則瑶宫閟洞必有所宴居仙秩真階必有所揚歷但麈凡敻隔不可得而詳焉先生門弟子達者四人栖瑶馮君惟良香林陳君寡言方瀛徐君靈府元和中東入天台山隨方宣教憲宗皇帝詔徴不起廣成先生劉君猶居嶽下武宗皇帝徴為天師入國傳道今江浙三洞之法以先生田君為祖師焉讃曰皇皇至道無名之朴惟師惟微匪清匪濁昭昭吾祖超然先覺默而得之學無所學媯川啓祚齊國承華樂道簞食橫經絳紗粃粳簮紱賔友煙霞躬耕致養盡孝于家深隱巖扄追真林嶺佺羡為侣松喬共永世晷徒遷我身彌靜欻駕飊車飛翔八景籍師天台山桐柏觀上清大洞三徴君馮君諱惟良長樂人也修道於衡嶽中宫與方瀛徐君香林陳君為煙蘿之友各葺靜室於中宫之側相去二三里焉其後於降真堂詣先生田君師稟真訣三洞幽奧咸得參授元和中東入天台山弘宣大教會稽廉察河南元稹聞其風而恱之敘懇緘詞望雲臻敬執弟子之禮時桐柏觀自貞一先生繕修之後綿歷歲年華殿層樓榛蕪翳薈三君記元戎之力再加興構作上清閣降真堂白雲亭翛間院以復貞一先生之迹以貞一田君舊傳三洞之道行于江南憲宗敬宗疊降徴詔蒲輪鶴書竟不能屈即於華林谷創栖瑶隱居以止焉於是履策尋幽遍討竒趣靈墟華頂瓊室石橋天姥桃花之源金庭黃雲之野翛然獨往纍月一歸自此深隱莫知其所門人三泂應君夷節玉霄葉君藏質字含象仙都劉君處靜金庭沈君觀無皆法葉仙枝輝映相繼盛於海內焉讃曰厥初太極是生雨儀混沌既鑿浮競交馳泝源歸朴以道為基天童寶籙授受于師液玉膏金胎元錬魄登壇告帝投披玄頥紫蓋云邁金庭是宅剪剃榛蕪中興桐柏萬壑岑寂三人得朋浙河之左吾道斯弘聖主翹德元戎服膺雲心無著鶴詔難徴星步風馭颯然上騰度師天台山道元院上清大洞道元先生賜紫應君諱夷節字適中祖汝南人東晉居婺女金華山今為東陽郡人也開元朝髙士徴君庶凝之玄孫仍世經明行修仕不求達先生道煥太和氣藴沖邈孕素靈之質竦紫庭之才體至精而不緇契谷神而無玷母何氏夫人夢流星入牖驚窹而神光在馬因覺懷妊元和五年庚寅歲誕而居然巽俗乳哺之中不喜葷雜年七歲辭親慕道就本郡蘭溪縣靈瑞觀吳尊師玄素受南華沖虛通靈真經及周易孝經論語諷讀專勤五行俱下十三歲備冠褐三衣五戒祇稟恭修師友仰之肅如也年十五入天台參正一十七佩髙玄紫虛十八詣龍虎山係天師十八代孫少任受三品大都功二十四參靈寶真文洞神洞玄之法二十九進升玄三十有二受上清大洞回車畢逍紫文素帶籍地騰天之符旁探子史內約玄詮晦迹韜光勤修妙頥以上清太法自句曲陶真人傳升玄王真人王傳體玄潘真人潘傳貞一司馬真人司馬傳南嶽薛天師季昌薛傳衡山田先生良逸田傳天台棲瑶馮徴君惟良馮傳先生奕葉降靈蟬聮至德青林委粹繼躡仙階玉霄葉君合象仙都劉君處靜皆同學也會昌三年棲桐柏觀西南翠屏巖别建淨壇冥心袐旨剪茅度水冀厥攸居越州觀察使李公褒遠慕貞規順風翹請奏置院額勑旨以道元為名既而息影林端五十餘載秉持大教日無曠時至吳越之人瞻香稽首願執巾几者或脫履人褰或揚名邦國不可具載懿哉先生自幼及長風塵靡雜擺落隂滓峭隔常偷溫潤沖澿真氣不散德宇嚴邃詞華朗清每入靜行齊登壇閲籙為時致福濟物度人肹通靈鬱有嘉瑞誦黃庭隱訣吟大洞瓊章八道望雲三元受事佪風隱地攀斗藏天勤而鍊之昏旦相續固亦降靈垂貺玄授真傳虛室而欻駕潛臻盻仰而飈車密稅先生得之矣聞者公俠傾矚藩屏欽迎飛章上聞允崇懿號荐奉芝詔寵錫紫衣雖叶世譽初心匪愜先生深意嘗謂門弟子曰吾以弘護本教不得遁世銷聲道不違人勤求可至玉京金闕泉曲酆都相去幾何惟心所兆後學之者勉弘之焉以範寧甲寅七月中會日朝謁訖澡沐入靜凝神如有所待八日丑時恬然解化春秋八十有五肢體柔和顏狀無攺真經所謂上解者也是夕清香滿院紫氣浮空禽鳥哀鳴山川失色後七日遷神干院東北隅石室為鍊蛻之所遵科範也是月四日有神二人羽服執簡自外而入儀質非凡院中門人繼往參訊但聞吟讃之聲巳失所在此乃靈宫之所玄告也又五年前孟冬月山中道士章敬玄於天台覯偶瞻巖峯之上見雲物紅紫紛然有異中有綵舟三艘其一玉霄葉君乘之一則方瀛劉君修然乘之一則先生居其皆二舟飄然飛去先生之舟在二舟之後果劉葉已先升化先生後方登遐益明得道之徴實表修行之應矣拾遺張穎述院記衡陽羅隱撰真鑽鴻筆鑠石麗藻清詞皆當朝偉才垂之不朽然而化仙之迹昭昭然未在賢儒之華顧惟孱眇輒紀大猷顒佇英才别加潤色後學弟子吳郡陸甚夷稽首煙霞直書其事門人廣成先生製讃曰道祕重玄迹分三洞玉字金訣玄虬紫鳯三景斯寶東華所諷理燭昏衢以醒大夢惟師懿德擺落氛囂商頌傲漢穎曲亂堯八道清鋉三元默朝修之造極功欲乘飈丹霍洞臺赤城仙宇闡法傳教靈規妙矩洞玄靈寶三師記
